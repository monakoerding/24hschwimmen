<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Zähler – 24 Stunden Schwimmen 2026</title>
<script>
// Design nach Tageszeit: tagsüber hell, nachts dunkel
(function () {
  var DAY_START_HOUR = 7;
  var DAY_END_HOUR = 21;
  function applyTheme() {
    var hour = new Date().getHours();
    var isDay = hour >= DAY_START_HOUR && hour < DAY_END_HOUR;
    document.documentElement.dataset.theme = isDay ? 'light' : 'dark';
  }
  applyTheme();
  setInterval(applyTheme, 60 * 1000);
})();
</script>
<link rel="stylesheet" href="style.css">
<script src="colors.js"></script>
</head>
<body class="counter-body">
<div class="counter-wrap">
  <div class="counter-header">
    <div class="eyebrow">Eberswalder Schwimmverein e. V. · 24 Stunden Schwimmen 2026</div>
    <div class="lane-tag"><span class="dot"></span>Zähler</div>
  </div>

  <div class="color-grid" id="colorGrid"></div>

  <div class="sync-indicator" id="syncIndicator" hidden></div>
</div>

<!-- Farbe belegen / wechseln -->
<div class="overlay" id="assignOverlay" hidden>
  <div class="overlay-panel card">
    <div class="overlay-header">
      <span class="eyebrow" id="assignTitle">Farbe belegen</span>
      <button class="secondary" id="assignCloseBtn">Abbrechen</button>
    </div>

    <label for="assignSearchInput">Registrierte Person/Team suchen</label>
    <input type="text" id="assignSearchInput" placeholder="Name oder Teamname tippen …">
    <div class="assign-search-list" id="assignSearchList"></div>
    <div class="empty-hint" id="assignSearchEmpty">Keine passende Person/kein Team gefunden.</div>

    <button class="secondary" id="assignNewToggleBtn" style="margin-top:12px;">+ Neu anmelden</button>

    <div id="assignNewForm" hidden style="margin-top:14px;">
      <div class="type-toggle" id="assignTypeToggle">
        <button type="button" class="type-toggle-btn active" id="assignTypeIndividualBtn">Einzelperson</button>
        <button type="button" class="type-toggle-btn" id="assignTypeTeamBtn">Team</button>
      </div>
      <div id="assignIndividualFields">
        <label for="assignFirstNameInput">Vorname</label>
        <input type="text" id="assignFirstNameInput" maxlength="40">
        <label for="assignLastNameInput">Nachname</label>
        <input type="text" id="assignLastNameInput" maxlength="40">
        <label for="assignClubInput">Verein</label>
        <input type="text" id="assignClubInput" maxlength="60">
        <label for="assignBirthDateInput">Geburtsdatum (optional)</label>
        <input type="date" id="assignBirthDateInput">
      </div>
      <div id="assignTeamFields" hidden>
        <label for="assignTeamNameInput">Teamname</label>
        <input type="text" id="assignTeamNameInput" maxlength="60">
        <label for="assignTeamClubInput">Verein (optional)</label>
        <input type="text" id="assignTeamClubInput" maxlength="60">
      </div>
      <button class="primary" id="assignNewSubmitBtn">Anmelden &amp; Farbe belegen</button>
    </div>
  </div>
</div>

<div class="name-tooltip" id="nameTooltip" hidden></div>
<div class="conn-badge" id="connBadge">verbinde…</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const connBadge = document.getElementById('connBadge');
socket.on('connect', () => { connBadge.textContent = 'verbunden'; connBadge.className = 'conn-badge ok'; flushPending(); });
socket.on('disconnect', () => { connBadge.textContent = 'getrennt'; connBadge.className = 'conn-badge bad'; });

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

let latestState = null;
let armedColor = null;
let assignColor = null; // Farbe, für die gerade das Belegen-Panel offen ist
let assignNewOpen = false;
let assignType = 'individual';

const LOCKOUT_MS = 10000; // Fallback, wird von der ersten state-Meldung überschrieben

// ---- Offline-Pufferung: Zählungen gehen bei Verbindungsverlust nicht
// verloren, sondern werden lokal gesammelt und beim Wiederverbinden als
// ein einziger Nachtrag pro Farbe gesendet (siehe adjustLaps im Backend). ----

const PENDING_KEY = 'swimCounterPending';

function loadPending() {
  try {
    return JSON.parse(localStorage.getItem(PENDING_KEY)) || {};
  } catch (e) {
    return {};
  }
}
function savePending(pending) {
  localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
}
function genActionId() {
  return 'a_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
}

function flushPending() {
  if (!socket.connected) return;
  const pending = loadPending();
  Object.keys(pending).forEach((color) => {
    const entry = pending[color];
    if (entry && entry.pendingDelta > 0) {
      socket.emit('adjustLaps', { color, delta: entry.pendingDelta, clientActionId: entry.clientActionId, clientTs: entry.lastTs });
    }
  });
  renderSyncIndicator();
}
setInterval(flushPending, 5000);

socket.on('actionAck', ({ clientActionId, color, deduped }) => {
  const pending = loadPending();
  if (pending[color] && pending[color].clientActionId === clientActionId) {
    delete pending[color];
    savePending(pending);
    renderSyncIndicator();
  }
});

function renderSyncIndicator() {
  const pending = loadPending();
  const colors = Object.keys(pending).filter((c) => pending[c] && pending[c].pendingDelta > 0);
  const el = document.getElementById('syncIndicator');
  if (colors.length === 0) {
    el.hidden = true;
    return;
  }
  el.hidden = false;
  const info = SWIM_COLORS.reduce((m, c) => (m[c.id] = c, m), {});
  el.textContent = '🔄 wird synchronisiert: ' + colors.map((c) => (info[c] ? info[c].name : c) + ' (' + pending[c].pendingDelta + ')').join(', ');
}

function localLap(colorId) { return SWIM_COLORS.find((c) => c.id === colorId); }

function serverLapsFor(color) {
  if (!latestState) return 0;
  const slot = latestState.lane.slots.find((s) => s.color === color);
  return slot ? slot.laps : 0;
}
function pendingDeltaFor(color) {
  const pending = loadPending();
  return pending[color] ? pending[color].pendingDelta : 0;
}
function displayedLapsFor(color) {
  return Math.max(0, serverLapsFor(color) + pendingDeltaFor(color));
}
function lockedUntilFor(color) {
  // Solange eine noch nicht synchronisierte lokale Aktion für diese Farbe
  // aussteht, ist ihr lockedUntil maßgeblich (auch wenn es 0 ist, z. B.
  // gerade durch "-1" aufgehoben) - sonst würde ein veralteter Server-Stand
  // von vor dem Verbindungsverlust die Sperre fälschlich wieder anzeigen.
  const pending = loadPending();
  if (pending[color] && typeof pending[color].lockedUntil === 'number') {
    return pending[color].lockedUntil;
  }
  const slot = latestState ? latestState.lane.slots.find((s) => s.color === color) : null;
  return slot ? slot.lockedUntil : 0;
}

// ---- Zählen ----

function triggerCount(color) {
  const slot = latestState && latestState.lane.slots.find((s) => s.color === color);
  if (!slot || !slot.occupantId) return; // Farbe nicht belegt - nichts zu zählen
  if (Date.now() < lockedUntilFor(color)) return; // gesperrt (online oder lokal)

  armedColor = color;

  if (socket.connected) {
    socket.emit('countLap', { color, clientActionId: genActionId() });
  } else {
    const pending = loadPending();
    const entry = pending[color] || { pendingDelta: 0, clientActionId: genActionId(), lastTs: 0 };
    entry.pendingDelta += 1;
    entry.lastTs = Date.now();
    entry.lockedUntil = Date.now() + LOCKOUT_MS;
    pending[color] = entry;
    savePending(pending);
    renderGrid();
    renderSyncIndicator();
  }
}

// Manuelle Korrektur (z. B. "-1" bei Vertippen) - bewusst OHNE Sperrzeit-
// Prüfung, funktioniert also auch während der 10s-Zählsperre. Eine
// Korrektur nach unten hebt die Sperre zusätzlich sofort auf (der
// vertippte Zähl-Tap, der sie ausgelöst hat, wurde ja gerade zurückgenommen),
// damit direkt weitergezählt werden kann. Läuft über denselben Offline-
// Puffer wie triggerCount, nur dass das Delta hier auch negativ sein kann.
function triggerAdjust(color, delta) {
  const slot = latestState && latestState.lane.slots.find((s) => s.color === color);
  if (!slot || !slot.occupantId) return;

  if (socket.connected) {
    socket.emit('adjustLaps', { color, delta, clientActionId: genActionId() });
  } else {
    const pending = loadPending();
    const entry = pending[color] || { pendingDelta: 0, clientActionId: genActionId(), lastTs: 0 };
    entry.pendingDelta += delta;
    entry.lastTs = Date.now();
    if (delta < 0) entry.lockedUntil = 0;
    pending[color] = entry;
    savePending(pending);
    renderGrid();
    renderSyncIndicator();
  }
}

// Zifferntasten 1-9/0 zählen direkt die passende Farbe (für 10 einzelne
// USB-Taster). Jede andere Taste zählt die zuletzt angetippte Farbe erneut
// (Fallback für einen einzelnen generischen Clicker).
document.addEventListener('keydown', (e) => {
  const tag = (e.target && e.target.tagName) || '';
  if (['INPUT', 'TEXTAREA', 'SELECT', 'BUTTON'].includes(tag)) return;
  if (!document.getElementById('assignOverlay').hidden) return;

  const byKey = SWIM_COLORS.find((c) => String(c.index) === e.key);
  if (byKey) {
    triggerCount(byKey.id);
    return;
  }
  if (armedColor) triggerCount(armedColor);
});

// ---- Farbe belegen / wechseln / freigeben ----

// Leert das "Neu anmelden"-Formular - sonst würde beim nächsten Öffnen
// (gleiche oder andere Farbe) noch der zuletzt eingetippte Name dastehen.
function clearAssignNewForm() {
  document.getElementById('assignFirstNameInput').value = '';
  document.getElementById('assignLastNameInput').value = '';
  document.getElementById('assignClubInput').value = '';
  document.getElementById('assignBirthDateInput').value = '';
  document.getElementById('assignTeamNameInput').value = '';
  document.getElementById('assignTeamClubInput').value = '';
}

function closeAssignOverlay() {
  document.getElementById('assignOverlay').hidden = true;
  document.getElementById('assignNewForm').hidden = true;
  assignNewOpen = false;
  clearAssignNewForm();
  assignColor = null;
}

function openAssignPanel(color, mode) {
  assignColor = color;
  assignNewOpen = false;
  assignType = 'individual';
  const info = SWIM_COLORS.find((c) => c.id === color);
  document.getElementById('assignTitle').textContent = 'Farbe ' + (info ? info.name : color) + (mode === 'switch' ? ' wechseln' : ' belegen');
  document.getElementById('assignSearchInput').value = '';
  document.getElementById('assignNewForm').hidden = true;
  clearAssignNewForm();
  setAssignType('individual');
  renderAssignSearch();
  document.getElementById('assignOverlay').hidden = false;
  document.getElementById('assignSearchInput').focus();
}
document.getElementById('assignCloseBtn').addEventListener('click', closeAssignOverlay);

document.getElementById('assignSearchInput').addEventListener('input', renderAssignSearch);

function occupiedParticipantIds(state) {
  return new Set(state.lane.slots.filter((s) => s.occupantId).map((s) => s.occupantId));
}
function participantDisplayName(p) {
  return p.type === 'team' ? p.teamName : ((p.firstName || '') + ' ' + (p.lastName || '')).trim();
}

function renderAssignSearch() {
  if (!latestState) return;
  const q = document.getElementById('assignSearchInput').value.trim().toLowerCase();
  const occupied = occupiedParticipantIds(latestState);
  const matches = latestState.participants.filter((p) => {
    if (occupied.has(p.id)) return false;
    if (!q) return true;
    return participantDisplayName(p).toLowerCase().includes(q);
  });
  const list = document.getElementById('assignSearchList');
  const empty = document.getElementById('assignSearchEmpty');
  list.innerHTML = '';
  empty.style.display = matches.length === 0 ? 'block' : 'none';
  matches.slice(0, 30).forEach((p) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'assign-search-item';
    btn.textContent = participantDisplayName(p) + (p.club ? ' · ' + p.club : '') + (p.type === 'team' ? ' (Team)' : '');
    btn.addEventListener('click', () => {
      socket.emit('assignSlot', { color: assignColor, participantId: p.id });
      closeAssignOverlay();
    });
    list.appendChild(btn);
  });
}

document.getElementById('assignNewToggleBtn').addEventListener('click', () => {
  assignNewOpen = !assignNewOpen;
  document.getElementById('assignNewForm').hidden = !assignNewOpen;
});

function setAssignType(t) {
  assignType = t;
  document.getElementById('assignTypeIndividualBtn').classList.toggle('active', t === 'individual');
  document.getElementById('assignTypeTeamBtn').classList.toggle('active', t === 'team');
  document.getElementById('assignIndividualFields').hidden = t !== 'individual';
  document.getElementById('assignTeamFields').hidden = t !== 'team';
}
document.getElementById('assignTypeIndividualBtn').addEventListener('click', () => setAssignType('individual'));
document.getElementById('assignTypeTeamBtn').addEventListener('click', () => setAssignType('team'));

document.getElementById('assignNewSubmitBtn').addEventListener('click', () => {
  if (!assignColor) return;
  let payload;
  if (assignType === 'team') {
    payload = {
      color: assignColor,
      type: 'team',
      teamName: document.getElementById('assignTeamNameInput').value.trim(),
      club: document.getElementById('assignTeamClubInput').value.trim(),
    };
    if (!payload.teamName) { alert('Bitte einen Teamnamen eintragen.'); return; }
  } else {
    payload = {
      color: assignColor,
      type: 'individual',
      firstName: document.getElementById('assignFirstNameInput').value.trim(),
      lastName: document.getElementById('assignLastNameInput').value.trim(),
      club: document.getElementById('assignClubInput').value.trim(),
      birthDate: document.getElementById('assignBirthDateInput').value,
    };
    if (!payload.firstName || !payload.lastName) { alert('Bitte Vor- und Nachnamen eintragen.'); return; }
  }
  socket.emit('assignSlotNew', payload);
  closeAssignOverlay();
});

socket.on('registerRejected', ({ reason }) => {
  if (reason === 'duplicateParticipant') {
    if (confirm('Es gibt schon jemanden mit diesem Namen/Teamnamen — trotzdem anlegen und Farbe belegen?')) {
      // Erneut senden, diesmal mit confirmDuplicate
      const t = assignType;
      let payload;
      if (t === 'team') {
        payload = { color: assignColor, type: 'team', teamName: document.getElementById('assignTeamNameInput').value.trim(), club: document.getElementById('assignTeamClubInput').value.trim(), confirmDuplicate: true };
      } else {
        payload = { color: assignColor, type: 'individual', firstName: document.getElementById('assignFirstNameInput').value.trim(), lastName: document.getElementById('assignLastNameInput').value.trim(), club: document.getElementById('assignClubInput').value.trim(), birthDate: document.getElementById('assignBirthDateInput').value, confirmDuplicate: true };
      }
      socket.emit('assignSlotNew', payload);
      closeAssignOverlay();
    }
    return;
  }
  alert('Bitte alle Pflichtfelder ausfüllen.');
});

function freeSlotWithConfirm(color, name) {
  if (!confirm((name || 'Diese Farbe') + ' freigeben? Der Einsatz wird beendet.')) return;
  socket.emit('freeSlot', { color });
}

// ---- Vollen Namen bei gedrückt gehaltenem Tap anzeigen ----
// Der Name in der Kachel wird bei Bedarf mit "…" abgeschnitten; solange
// man ihn gedrückt hält, erscheint eine kleine Sprechblase mit dem
// kompletten Namen (dafür außerhalb der Kachel, da diese overflow:hidden hat).

const nameTooltip = document.getElementById('nameTooltip');

function showNameTooltip(e) {
  const name = e.currentTarget.dataset.fullName;
  if (!name) return;
  e.preventDefault();
  nameTooltip.textContent = name;
  nameTooltip.hidden = false;
  const rect = e.currentTarget.getBoundingClientRect();
  const tw = nameTooltip.offsetWidth;
  const th = nameTooltip.offsetHeight;
  let left = rect.left + rect.width / 2 - tw / 2;
  left = Math.max(6, Math.min(left, window.innerWidth - tw - 6));
  let top = rect.top - th - 8;
  // Für Kacheln in der obersten Reihe reicht "oberhalb" bis in den Kopfbereich
  // hinein - dann lieber unterhalb der Kachel anzeigen.
  if (top < 50) top = rect.bottom + 8;
  top = Math.max(6, Math.min(top, window.innerHeight - th - 6));
  nameTooltip.style.left = left + 'px';
  nameTooltip.style.top = top + 'px';
}
function hideNameTooltip() {
  nameTooltip.hidden = true;
}
document.addEventListener('pointerup', hideNameTooltip);
document.addEventListener('pointercancel', hideNameTooltip);
document.addEventListener('pointerleave', hideNameTooltip);

// ---- Rendering des Farb-Grids ----

const cooldownTimers = {};

function renderGrid() {
  if (!latestState) return;
  const grid = document.getElementById('colorGrid');
  const slotsByColor = {};
  latestState.lane.slots.forEach((s) => { slotsByColor[s.color] = s; });

  grid.innerHTML = '';
  SWIM_COLORS.forEach((c) => {
    const slot = slotsByColor[c.id];
    const occupied = !!(slot && slot.occupantId);
    const laps = displayedLapsFor(c.id);
    const lockedUntil = lockedUntilFor(c.id);
    const remaining = lockedUntil - Date.now();

    const card = document.createElement('div');
    card.className = 'color-card ' + (occupied ? 'occupied' : 'free') + (remaining > 0 ? ' locked' : '') + (armedColor === c.id ? ' armed' : '');
    card.style.setProperty('--card-color', c.hex);
    card.style.setProperty('--card-text', c.text);

    if (occupied) {
      // Kompaktes Layout: linkes Drittel = Korrektur (-1) + "raus",
      // rechte zwei Drittel = großflächige Zählfläche.
      card.innerHTML = `
        <div class="color-card-top">
          <span class="color-swatch" style="background:${c.hex};border:${c.id === 'white' ? '1px solid var(--line)' : 'none'}"></span>
          <span class="color-name">${c.name}</span>
          <span class="color-card-occupant" data-full-name="${escapeHtml(slot.occupantName || '')}">· ${escapeHtml(slot.occupantName || '')}</span>
        </div>
        <div class="color-card-body">
          <div class="color-card-side">
            <button type="button" class="card-action-btn minus-btn">-1</button>
            <button type="button" class="card-action-btn free-btn">raus</button>
          </div>
          <div class="color-card-count">
            <div class="color-card-count-label">Zählen</div>
            <div class="color-card-laps mono">${laps}</div>
            <div class="color-card-cooldown">${remaining > 0 ? 'gesperrt ' + Math.ceil(remaining / 1000) + ' s' : ''}</div>
          </div>
        </div>
      `;
      card.querySelector('.color-card-count').addEventListener('click', () => triggerCount(c.id));
      card.querySelector('.minus-btn').addEventListener('click', (e) => { e.stopPropagation(); triggerAdjust(c.id, -1); });
      card.querySelector('.free-btn').addEventListener('click', (e) => { e.stopPropagation(); freeSlotWithConfirm(c.id, slot.occupantName); });
      card.querySelector('.color-card-occupant').addEventListener('pointerdown', showNameTooltip);
      // "Wechseln" (Farbe direkt an eine andere Person/Team übergeben, ohne
      // erst freizugeben) ist vorerst aus der Bedienung entfernt, aber im
      // Code archiviert: openAssignPanel(color, 'switch') funktioniert
      // weiterhin unverändert und kann bei Bedarf wieder an einen Button
      // gehängt werden.
    } else {
      card.innerHTML = `
        <div class="color-card-top">
          <span class="color-swatch" style="background:${c.hex};border:${c.id === 'white' ? '1px solid var(--line)' : 'none'}"></span>
          <span class="color-name">${c.name}</span>
        </div>
        <div class="color-card-empty">– frei –</div>
        <button type="button" class="card-action-btn primary-action">Farbe belegen</button>
      `;
      card.querySelector('.primary-action').addEventListener('click', () => openAssignPanel(c.id, 'assign'));
    }

    grid.appendChild(card);
  });
}

socket.on('countRejected', ({ color, remainingMs }) => {
  const pending = loadPending();
  pending[color] = pending[color] || { pendingDelta: 0, clientActionId: genActionId(), lastTs: 0 };
  pending[color].lockedUntil = Date.now() + remainingMs;
  savePending(pending);
  renderGrid();
});

socket.on('state', (state) => {
  latestState = state;
  renderGrid();
  renderSyncIndicator();
});

// Tickt die Sperrzeit-Anzeige jede Sekunde herunter, ohne auf ein neues
// state-Ereignis zu warten.
setInterval(() => { if (latestState) renderGrid(); }, 1000);
</script>
</body>
</html>
