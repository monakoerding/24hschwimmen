<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bahn – 24 Stunden Schwimmen 2026</title>
<script>
// Design nach Tageszeit: tagsüber hell, nachts dunkel
(function () {
  var DAY_START_HOUR = 7;
  var DAY_END_HOUR = 21;
  function applyTheme() {
    var hour = new Date().getHours();
    var isDay = hour >= DAY_START_HOUR && hour < DAY_END_HOUR;
    document.documentElement.dataset.theme = isDay ? 'light' : 'dark';
  }
  applyTheme();
  setInterval(applyTheme, 60 * 1000);
})();
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="tv">
  <div class="tv-header">
    <div>
      <div class="tv-lane-label">24 Stunden Schwimmen 2026</div>
      <div class="tv-event-label">Von 12 bis 12 Uhr muss immer wer im Wasser schwimmen &ndash; eine große Staffel</div>
    </div>
    <div class="tv-clock mono" id="clock">--:--:--</div>
  </div>

  <div class="tv-body">
    <div class="tv-main">
      <div class="tv-total">
        <div class="tv-total-label">Gesamtstrecke der Staffel</div>
        <div class="tv-total-value mono" id="totalDistValue">0 m</div>
        <div class="tv-total-sub" id="totalLapsValue">0 Bahnen</div>
      </div>

      <div class="tv-swimmer">
        <div id="swimmerBlock">
          <div class="idle">Bahn ist frei</div>
        </div>
      </div>

      <div class="tv-stats">
        <div class="stat-box">
          <div class="label">Bahnen diese Runde</div>
          <div class="value" id="lapsValue">0</div>
        </div>
        <div class="stat-box">
          <div class="label">Strecke diese Runde</div>
          <div class="value" id="distValue">0 m</div>
        </div>
      </div>
    </div>

    <div class="tv-queue-panel">
      <div class="tv-queue-title">Als nächstes dran:</div>
      <ol class="tv-queue-list" id="tvQueueList"></ol>
      <div class="empty-hint" id="tvQueueEmptyHint">Warteliste ist leer.</div>

      <div class="tv-progress">
        <div class="tv-progress-title">Fortschritt</div>
        <div class="tv-progress-wrap" id="tvProgressWrap">
          <div class="tv-progress-track"><div class="tv-progress-fill" id="tvProgressFill"></div></div>
        </div>
        <div class="tv-progress-current mono" id="tvProgressCurrent">0 km</div>
      </div>
    </div>
  </div>

  <div class="waterline" style="margin-top:20px;"></div>
</div>
<canvas id="celebrationCanvas"></canvas>
<div class="conn-badge" id="connBadge">verbinde…</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io();
const connBadge = document.getElementById('connBadge');
socket.on('connect', () => { connBadge.textContent = 'verbunden'; connBadge.className = 'conn-badge ok'; });
socket.on('disconnect', () => { connBadge.textContent = 'getrennt'; connBadge.className = 'conn-badge bad'; });

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderQueue(state) {
  const list = document.getElementById('tvQueueList');
  const emptyHint = document.getElementById('tvQueueEmptyHint');
  list.innerHTML = '';
  if (state.queue.length === 0) {
    emptyHint.style.display = 'block';
  } else {
    emptyHint.style.display = 'none';
    state.queue.forEach((s) => {
      const li = document.createElement('li');
      li.textContent = s.name;
      list.appendChild(li);
    });
  }
}

// Bekannte Strecken als Etappenziele auf dem Weg zur Gesamtstrecke
const CHECKPOINTS = [
  { label: 'Uelzen', km: 5 },
  { label: 'Ebstorf', km: 8 },
  { label: 'Halbmarathon', km: 21.1 },
  { label: 'Ärmelkanal', km: 34 },
  { label: 'Marathon', km: 42.2 },
];

function renderProgress(state) {
  const km = state.totalDistanceM / 1000;
  const maxKm = Math.max(CHECKPOINTS[CHECKPOINTS.length - 1].km * 1.15, km * 1.08, 1);

  document.getElementById('tvProgressCurrent').textContent =
    km.toLocaleString('de-DE', { maximumFractionDigits: 1 }) + ' km';

  document.getElementById('tvProgressFill').style.height = Math.min(100, (km / maxKm) * 100) + '%';

  const wrap = document.getElementById('tvProgressWrap');
  wrap.querySelectorAll('.tv-progress-marker').forEach((el) => el.remove());
  CHECKPOINTS.forEach((cp) => {
    const pct = Math.min(100, (cp.km / maxKm) * 100);
    const marker = document.createElement('div');
    marker.className = 'tv-progress-marker';
    marker.style.bottom = pct + '%';
    marker.innerHTML = `<span class="tv-progress-marker-line"></span><span class="tv-progress-marker-label">${escapeHtml(cp.label)} (${cp.km} km)</span>`;
    wrap.appendChild(marker);
  });
}

socket.on('state', (state) => {
  const lane = state.lane;
  const block = document.getElementById('swimmerBlock');
  if (lane.swimmerName) {
    block.innerHTML = `
      <div class="status">Es schwimmt:</div>
      <div class="name">${escapeHtml(lane.swimmerName)}</div>
      ${lane.swimmerCry ? `<div class="cry">${escapeHtml(lane.swimmerCry)}</div>` : ''}
    `;
  } else {
    block.innerHTML = `<div class="idle">Bahn ist frei</div>`;
  }
  document.getElementById('lapsValue').textContent = lane.laps;
  document.getElementById('distValue').textContent = lane.distanceM + ' m';
  document.getElementById('totalDistValue').textContent = state.totalDistanceM.toLocaleString('de-DE') + ' m';
  document.getElementById('totalLapsValue').textContent = state.totalLaps.toLocaleString('de-DE') + ' Bahnen';
  renderQueue(state);
  renderProgress(state);
});

function tickClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE');
}
setInterval(tickClock, 1000);
tickClock();

// ---- Feier-Feuerwerk am Ende der Staffel ----
const celebrationCanvas = document.getElementById('celebrationCanvas');
const cctx = celebrationCanvas.getContext('2d');
let celebrating = false;
let celebrationSpawnInterval = null;
let confettiParticles = [];
const CONFETTI_COLORS = ['#FFD84A', '#FF6B4A', '#2EC4C6', '#6BD08A', '#FF8AD4', '#7CA8FF'];

function resizeCelebrationCanvas() {
  celebrationCanvas.width = window.innerWidth;
  celebrationCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCelebrationCanvas);

function spawnConfettiBurst() {
  const x = Math.random() * celebrationCanvas.width;
  for (let i = 0; i < 18; i++) {
    confettiParticles.push({
      x, y: -10,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 2 + 2,
      size: Math.random() * 8 + 4,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
    });
  }
}

function celebrationLoop() {
  if (!celebrating) return;
  cctx.clearRect(0, 0, celebrationCanvas.width, celebrationCanvas.height);
  confettiParticles.forEach((p) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.03;
    p.rotation += p.rotSpeed;
    cctx.save();
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rotation);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    cctx.restore();
  });
  confettiParticles = confettiParticles.filter((p) => p.y < celebrationCanvas.height + 20);
  requestAnimationFrame(celebrationLoop);
}

socket.on('celebrate', () => {
  if (celebrating) return;
  celebrating = true;
  resizeCelebrationCanvas();
  celebrationCanvas.style.display = 'block';
  celebrationSpawnInterval = setInterval(spawnConfettiBurst, 300);
  requestAnimationFrame(celebrationLoop);
});

socket.on('stopCelebration', () => {
  celebrating = false;
  if (celebrationSpawnInterval) {
    clearInterval(celebrationSpawnInterval);
    celebrationSpawnInterval = null;
  }
  confettiParticles = [];
  cctx.clearRect(0, 0, celebrationCanvas.width, celebrationCanvas.height);
  celebrationCanvas.style.display = 'none';
});
</script>
</body>
</html>
